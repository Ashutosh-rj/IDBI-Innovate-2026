server:
  port: 8084

spring:
  application:
    name: health-card-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:msme_health_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: health-card-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# The ONE documented exception per Rule 4: live sandbox endpoint to OCEN/ULI
ocen:
  adapter:
    sandbox-url: https://api.ocen.dev/v4/lsp/publish-scorecard
    uli-url: https://api.uli.rbi.org.in/v1/credit-passport
    lsp-id: LSP-IDBI-INNOVATE-001

msme:
  kafka:
    topics:
      score-computed: score-computed-events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
