# MSME Financial Health Scoring — External Risk Band Policy Rules (AUDIT-T3-1)
# Governed by IDBI Bank Risk Committee & RBI Fair Lending Guidelines
# This external policy layer allows risk cutoffs, loan limits, and interest rates to be modified or hot-reloaded
# without altering code or re-compiling the scoring engine.

version: "2026.07.v1"
lastUpdated: "2026-07-08"
description: "Externalized risk band policy rules for MSME financial health scoring (AUDIT-T3-1)"

riskBands:
  - name: "PRIME_LOW_RISK"
    minScore: 750
    maxScore: 1000
    ocenEligibility:
      isEligible: true
      maxLoanAmountInr: 5000000.0
      recommendedInterestRatePa: 10.5
    ntcThinFileRules:
      isEligible: true
      maxLoanAmountInr: 5000000.0
      recommendedInterestRatePa: 10.5

  - name: "STANDARD_MODERATE_RISK"
    minScore: 650
    maxScore: 749
    ocenEligibility:
      isEligible: true
      maxLoanAmountInr: 2500000.0
      recommendedInterestRatePa: 12.5
    ntcThinFileRules:
      isEligible: true
      maxLoanAmountInr: 2500000.0
      recommendedInterestRatePa: 12.5

  - name: "SUBPRIME_HIGH_RISK"
    minScore: 550
    maxScore: 649
    ocenEligibility:
      isEligible: true
      maxLoanAmountInr: 1000000.0
      recommendedInterestRatePa: 15.0
    ntcThinFileRules:
      isEligible: true
      maxLoanAmountInr: 1000000.0
      recommendedInterestRatePa: 15.0

  - name: "HIGH_RISK_REJECT"
    minScore: 0
    maxScore: 549
    ocenEligibility:
      isEligible: false
      maxLoanAmountInr: 0.0
      recommendedInterestRatePa: 0.0
    ntcThinFileRules:
      isEligible: false
      maxLoanAmountInr: 0.0
      recommendedInterestRatePa: 0.0

subscoreWeights:
  taxComplianceScore: 0.30
  cashFlowVelocityScore: 0.25
  payrollStabilityScore: 0.15
  businessVintageScore: 0.15
  liquidityBufferScore: 0.15

scoringWeights:
  chequeBouncePenalty: -30.0
  chequeCleanBonus: 20.0
  ntcThinFileBaseline: 65.0
  liquidityBaseline: 70.0
  odUtilBonus: 10.0
  odUtilThreshold: 0.70
  shapPointsMultiplier: 60.0
  domainMultipliers:
    gstRegularity: 80.0
    gstGrowthBonus: 10.0
    gstItcBonus: 10.0
    payrollRegularity: 85.0
    payrollGrowthBonus: 15.0
    payrollUncoveredBaseline: 60.0
    vintageMaxMonths: 36.0
    vintagePanMatchBonus: 20.0
    vintageLinkedAccBonus: 20.0
    cfVolumeMaxCap: 60.0
    cfVolumeDivisor: 500.0
    cfRatioHighBonus: 25.0
    cfRatioModBonus: 15.0
    cfPayersBonus: 15.0
  simulationCoefficients:
    gstrWeight: 0.45
    odUtilWeight: 0.50
    bounceWeight: 30.0
    epfWeight: 0.30
