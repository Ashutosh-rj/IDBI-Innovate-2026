global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'msme-registry'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['msme-registry:8081']

  - job_name: 'consent-aa'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['consent-aa:8082']

  - job_name: 'ingestion'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ingestion:8083']

  - job_name: 'health-card'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['health-card:8084']

  - job_name: 'scoring-engine'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['scoring-engine:8000']
