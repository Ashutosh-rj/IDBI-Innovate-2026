name: IDBI Innovate 2026 — MSME Health Platform CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 0. Secret Leakage & Credential Scanning (AUDIT-T0-3)
  secret-scanning:
    name: Secret & Credential Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # 1. Validate Synthetic Data Engine (SGSDG) & KS Drift
  validate-synthetic-data:
    name: Validate SGSDG & KS Distribution Drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-generators/sgsdg/requirements.txt

      - name: Run SGSDG Generator Validation
        run: |
          mkdir -p /tmp/sgsdg_test
          PYTHONPATH=data-generators/sgsdg python data-generators/sgsdg/generate_and_validate.py --count 200 --seed 42 --output /tmp/sgsdg_test/synthetic_cohort.jsonl

  # 2. Test Scoring Engine & TreeSHAP Monotonicity
  test-scoring-engine:
    name: Test XGBoost/LightGBM & SHAP Monotonicity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-generators/sgsdg/requirements.txt
          pip install -r services/scoring-engine/requirements.txt
          pip install pytest pytest-cov

      - name: Generate Small Cohort for Training Bake-off
        run: |
          mkdir -p /tmp/data_ci
          PYTHONPATH=data-generators/sgsdg python data-generators/sgsdg/generate_and_validate.py --count 200 --seed 42 --output /tmp/data_ci/cohort.jsonl

      - name: Train Bake-off Model & Verify Monotonic Constraints
        run: |
          mkdir -p services/scoring-engine/ml/artifacts
          PYTHONPATH=services/scoring-engine:services/scoring-engine/app python services/scoring-engine/ml/train.py --data /tmp/data_ci/cohort.jsonl --output services/scoring-engine/ml/artifacts/model.pkl --report /tmp/MODEL_CARD.md

      - name: Run Scoring Engine Unit & API Tests
        run: |
          PYTHONPATH=services/scoring-engine:services/scoring-engine/app pytest services/scoring-engine/tests/ -v

  # 3. Build Spring Boot Microservices
  build-spring-services:
    name: Build 5 Spring Boot Microservices (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Parent POM & Microservices
        run: |
          cd services
          mvn clean package -DskipTests --no-transfer-progress

  # 4. Build Frontend React PWAs (Vite + TypeScript + Tailwind v4)
  build-frontend-apps:
    name: Build Banker Dashboard & MSME PWA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Banker Dashboard
        run: |
          cd apps/banker-dashboard
          npm install --no-audit --no-fund
          npm run build

      - name: Build MSME PWA
        run: |
          cd apps/msme-pwa
          npm install --no-audit --no-fund
          npm run build

  # 5. Validate Kubernetes Manifests
  validate-k8s-manifests:
    name: Validate K8s Manifests Syntax & Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate all YAML manifests in /k8s
        run: |
          kubeconform -summary -verbose -schema-location default -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' -ignore-missing-schemas k8s/

  # 6. Static Application Security Testing (SAST) via Semgrep (AUDIT-T3-6)
  sast-scanning:
    name: Semgrep SAST Code Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST Code Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/owasp-top-ten
            p/secrets
            p/java
            p/python
            p/javascript
            p/typescript

  # 7. Container & Dependency Vulnerability Scanning via Trivy & Grype (AUDIT-T3-6)
  container-scanning:
    name: Trivy & Grype Container Vulnerability Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21 for Dependency Cache
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Populate Local Maven Cache
        run: |
          cd services
          mvn dependency:resolve -q --no-transfer-progress || true

      - name: Run Trivy FS Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          offline-scan: 'true'

      - name: Run Grype FS Vulnerability Scan
        uses: anchore/scan-action@v3
        with:
          path: '.'
          fail-build: false
          severity-cutoff: 'critical'

      - name: Build Scoring Engine Docker Image for Scanning
        run: |
          docker build -t msme-scoring-engine:ci -f services/scoring-engine/Dockerfile .

      - name: Scan Scoring Engine Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'msme-scoring-engine:ci'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          offline-scan: 'true'

      - name: Scan Scoring Engine Image with Grype
        uses: anchore/scan-action@v3
        with:
          image: 'msme-scoring-engine:ci'
          fail-build: false
          severity-cutoff: 'critical'

