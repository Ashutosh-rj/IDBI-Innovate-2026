# 1. MSME Registry Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: msme-registry
  namespace: msme-health-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: msme-registry
  template:
    metadata:
      labels:
        app: msme-registry
    spec:
      containers:
        - name: msme-registry
          image: msme-health/msme-registry:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: msme-platform-config
            - secretRef:
                name: msme-platform-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: msme-registry-service
  namespace: msme-health-platform
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: msme-registry

