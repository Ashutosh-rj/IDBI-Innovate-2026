apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoring-engine
  namespace: msme-health-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scoring-engine
  template:
    metadata:
      labels:
        app: scoring-engine
    spec:
      containers:
        - name: scoring-engine
          image: msme-health/scoring-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: msme-platform-config
          env:
            - name: MODEL_PATH
              value: "/app/models/saved/xgboost_health_scorer.model"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: scoring-engine-service
  namespace: msme-health-platform
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: scoring-engine
