apiVersion: v1
kind: ConfigMap
metadata:
  name: msme-platform-config
  namespace: msme-health-platform
data:
  ENVIRONMENT: "production"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service.msme-health-platform.svc.cluster.local:9092"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-service.msme-health-platform.svc.cluster.local:5432/msme_health"
  SPRING_DATA_REDIS_HOST: "redis-service.msme-health-platform.svc.cluster.local"
  SPRING_DATA_REDIS_PORT: "6379"
  ROUTING_MSME_REGISTRY_URL: "http://msme-registry-service:8081"
  ROUTING_CONSENT_AA_URL: "http://consent-aa-service:8082"
  ROUTING_INGESTION_URL: "http://ingestion-service:8083"
  ROUTING_HEALTH_CARD_URL: "http://health-card-service:8084"
  ROUTING_SCORING_ENGINE_URL: "http://scoring-engine-service:8000"
  OCEN_SANDBOX_URL: "https://sandbox.ocen.dev/v4/credit-passport"
  APP_DATA_MODE: "sandbox"

---
apiVersion: v1
kind: Secret
metadata:
  name: msme-platform-secrets
  namespace: msme-health-platform
type: Opaque
stringData:
  POSTGRES_DB: "msme_health"
  POSTGRES_USER: "REPLACE_WITH_SECURE_USER"
  POSTGRES_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  REDIS_PASSWORD: "REPLACE_WITH_SECURE_REDIS_SECRET"
  JWT_SECRET: "REPLACE_WITH_AT_LEAST_32_CHAR_256_BIT_SECRET_KEY"
